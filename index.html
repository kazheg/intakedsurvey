<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cognitive &amp; Perceptual Studies — Intake Survey</title>
<link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23f2f1ec'/%3E%3Crect x='2' y='2' width='12' height='12' fill='%233a3a38'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f1ec;
    --paper: #ebe9e2;
    --ink: #3a3a38;
    --ink-soft: #6b6b66;
    --border-live: #c9c6bb;
    --accent-live: #4a5568;
    --dread: 0;
    --scanline-opacity: 0.06;
    --serif: 'PT Serif', Georgia, 'Times New Roman', serif;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --current-font: var(--serif);
  }

  /* Customization Themes */
  [data-theme="crimson"] {
    --bg: #1c0a0a;
    --paper: #2a1111;
    --ink: #e8d0d0;
    --ink-soft: #9c6c6c;
    --border-live: #5e2626;
    --accent-live: #b33939;
  }
  
  [data-theme="void"] {
    --bg: #050505;
    --paper: #0f0f0f;
    --ink: #d4d4d4;
    --ink-soft: #5e5e5e;
    --border-live: #2b2b2b;
    --accent-live: #757575;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--current-font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background-color 1.5s ease, color 1.5s ease;
    overflow-x: hidden;
  }

  body {
    filter: saturate(calc(1 - (var(--dread) * 0.025))) contrast(calc(1 + (var(--dread) * 0.015)));
    transition: filter 3s ease;
  }

  #app {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 20px 96px;
    z-index: 10;
  }

  /* Background Canvas for Procedural Horror Elements */
  #fxCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 2s ease;
    mix-blend-mode: multiply;
  }
  
  [data-theme="void"] #fxCanvas, [data-theme="crimson"] #fxCanvas { 
    mix-blend-mode: screen; 
  }

  /* Header */
  .masthead {
    width: 100%;
    max-width: 620px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border-live);
    padding-bottom: 14px;
    transition: border-color 2s ease;
  }
  .masthead .dept {
    font-family: var(--current-font);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .masthead .title {
    font-family: var(--current-font);
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }

  /* Progress */
  .progress-wrap { width: 100%; max-width: 620px; margin-bottom: 34px; }
  .progress-track { width: 100%; height: 6px; background: rgba(128,128,128,0.2); border-radius: 3px; position: relative; }
  .progress-fill { height: 100%; background: var(--accent-live); border-radius: 3px; width: 0%; transition: width 0.6s cubic-bezier(.4,0,.2,1), background 1.5s ease; }
  .progress-label { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); margin-top: 6px; display: flex; justify-content: space-between; }

  /* Survey Card */
  .card {
    width: 100%;
    max-width: 620px;
    background: var(--paper);
    border: 1px solid var(--border-live);
    border-radius: 3px;
    padding: 36px 34px;
    transition: opacity 0.55s ease, transform 0.55s ease, border-color 2s ease, background-color 1s ease, filter 0.2s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    position: relative;
  }
  .card.entering { opacity: 0; transform: translateY(8px); }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.leaving { opacity: 0; transform: translateY(-6px); }

  /* UI Glitch class applied to card */
  .glitch-heavy {
    animation: rgbShift 0.15s infinite alternate;
    filter: invert(10%) drop-shadow(4px 0px 0px red) drop-shadow(-4px 0px 0px blue);
  }
  
  @keyframes rgbShift {
    0% { transform: translate(1px, 1px); }
    100% { transform: translate(-1px, -1px); }
  }

  .section-tag { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 14px; }
  .prompt { font-family: var(--current-font); font-size: 19px; line-height: 1.5; margin-bottom: 22px; position: relative; }
  
  /* Text glitch */
  .prompt.glitching { color: var(--ink); }
  .prompt.glitching::before, .prompt.glitching::after {
    content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; opacity: 0.55; pointer-events: none;
  }
  .prompt.glitching::before { color: #c0453e; transform: translate(2.5px, -1px); clip-path: inset(0 0 55% 0); }
  .prompt.glitching::after { color: #3e8fc0; transform: translate(-2.5px, 1px); clip-path: inset(45% 0 0 0); }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border-live); border-radius: 3px; cursor: pointer; font-size: 15.5px; background: rgba(255,255,255,0.05); transition: border-color 0.3s ease, background 0.3s ease; }
  .option:hover { border-color: var(--accent-live); background: rgba(128,128,128,0.1); }
  .option.selected { border-color: var(--accent-live); background: rgba(128,128,128,0.15); }
  .option .dot { width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid var(--ink-soft); flex-shrink: 0; position: relative; }
  .option.selected .dot::after { content: ''; position: absolute; top: 3px; left: 3px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-live); }
  
  .error-msg { font-family: var(--mono); font-size: 12.5px; color: var(--accent-live); margin: -10px 0 16px; min-height: 16px; }

  /* Controls & Settings */
  .btn-row { display: flex; justify-content: flex-end; align-items: center; gap: 14px; min-height: 40px; }
  .btn { font-family: var(--current-font); font-size: 14.5px; padding: 10px 22px; background: var(--ink); color: var(--bg); border: 1px solid var(--ink); border-radius: 2px; cursor: pointer; transition: background 0.3s ease, opacity 0.3s ease; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn:not(:disabled):hover { background: transparent; color: var(--ink); }

  .controls-container { position: fixed; bottom: 14px; right: 14px; display: flex; gap: 8px; z-index: 60; }
  .floating-btn { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); background: var(--paper); border: 1px solid var(--border-live); border-radius: 20px; padding: 6px 12px; cursor: pointer; user-select: none; transition: all 0.2s; }
  .floating-btn:hover { background: var(--border-live); color: var(--bg); }
  .footer-disclaimer { position: fixed; left: 14px; bottom: 10px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft); opacity: 0.55; max-width: 320px; z-index: 50; pointer-events: none; }

  /* Effects */
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.4) 0px, rgba(0,0,0,0.4) 1px, transparent 1px, transparent 3px);
    opacity: var(--scanline-opacity); transition: opacity 1s ease;
  }
  .scanlines.glitch { opacity: 0.25; }

  .fade-to-black { position: fixed; inset: 0; background: #000; z-index: 400; opacity: 0; transition: opacity 2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .fade-to-black.active { opacity: 1; pointer-events: all; }
  .ending-text { font-family: var(--current-font); font-size: 21px; color: #fff; max-width: 500px; text-align: center; line-height: 1.6; opacity: 0; transition: opacity 2s ease 1s; padding: 20px;}
  .ending-text.show { opacity: 1; }
  
  /* Jump Scare Flash */
  .jumpscare-flash { position: fixed; inset: 0; background: #fff; z-index: 999; opacity: 0; pointer-events: none; }

  @media (max-width: 640px) { .card { padding: 26px 22px; } .prompt { font-size: 17px; } }
  @media (prefers-reduced-motion: reduce) { .card { transition: opacity 0.3s ease; } #fxCanvas { display: none; } }
</style>
</head>
<body>
<!-- Canvas for Generative Graphics -->
<canvas id="fxCanvas"></canvas>
<div class="scanlines" id="scanlines"></div>
<div class="jumpscare-flash" id="jumpscare"></div>

<div id="app"></div>
<div class="footer-disclaimer">Fictional horror experience. Content Warning: memory loss, jump scares, visual glitches. Enable sound.</div>

<div class="controls-container">
  <div class="floating-btn" id="soundToggle">sound: off</div>
  <div class="floating-btn" id="themeToggle">theme: clinical</div>
</div>

<script>
(function() {
  "use strict";

  const state = {
    screen: 'consent',
    qIndex: 0,
    answers: {},
    name: 'Subject',
    dread: 0,
    reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    soundOn: false,
    themeIndex: 0,
    themes: ['default', 'crimson', 'void'],
    endings: { conformity: 0, rebellion: 0, madness: 0 }
  };

  const QUESTIONS = [
    { id: 'q1', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'Please select your designated identifier.',
      options: ['Subject A-90', 'Guest', 'I was not given one', 'The name on the door'],
      effect: (val) => { if(val === 'Subject A-90') state.endings.conformity++; else state.endings.rebellion++; } },
    { id: 'q2', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'On an average night, how many hours do you sleep?',
      options: ['Fewer than 5', '5–6', '7–8', 'More than 8'] },
    
    { id: 'q3', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'Do you ever feel watched while alone in a room with the door closed?',
      options: ['Never', 'Once', 'A few times', 'Regularly'],
      effect: (val) => { if(val === 'Regularly') state.endings.madness++; } },
    { id: 'q4', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'After locking a door, how often do you check it again?',
      options: ['Never', 'Once', 'Twice', 'More than twice'] },

    { id: 'q5', section: 3, sectionTitle: 'Perceptual Baseline', type: 'single',
      prompt: 'As a child, did you ever count the moon and arrive at a number other than one?',
      options: ['No, never', 'Once, and I dismissed it', 'More than once', "I don't recall counting"],
      flags: { progressGlitch: true },
      effect: (val) => { if(val === 'More than once') state.endings.madness += 2; } },
    { id: 'q6', section: 3, sectionTitle: 'Perceptual Baseline', type: 'single',
      prompt: 'Think of your childhood bedroom. Was there a wall without a door or a window that you avoided?',
      options: ['No such wall existed', "Yes, but I don't know why", "I've never thought about it until now", "I'd rather not answer"],
      flags: { overwrite: true, audioSting: true } },

    { id: 'q7', section: 4, sectionTitle: 'Perceptual Baseline II', type: 'single',
      prompt: "In your kindergarten class photograph, who is the person standing behind you that isn't listed on the roster?",
      options: ["My imaginary friend", "A dark shadow", "The smiling man", "Me, somehow"],
      flags: { titleHijack: true, heavyGlitch: true } },
    
    { id: 'q8', section: 5, sectionTitle: 'Follow-Up', type: 'single',
      prompt: 'We appreciate you telling us about {name}. Are you sure you are alone?',
      options: ['Yes', 'No', "I'm not sure anymore", 'Stop asking me that'],
      effect: (val) => { if(val === 'Stop asking me that') state.endings.rebellion += 2; else if (val === 'Yes') state.endings.conformity++; } },
    
    { id: 'q9', section: 6, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'Say your name out loud. What happened when you did?',
      options: ["Nothing at all", "Someone whispered it back", "The lights flickered", "I forgot how to speak"],
      flags: { jumpScare: true } },
    { id: 'q10', section: 6, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'We are finished. Choose your final truth. It no longer needs to be real.',
      options: ["I accept my fate", "Let me out of here", "I will wake up soon", "There is no way out"],
      effect: (val) => { 
        if(val === 'I accept my fate') state.endings.conformity += 5; 
        if(val === 'Let me out of here') state.endings.rebellion += 5;
        if(val === 'I will wake up soon' || val === 'There is no way out') state.endings.madness += 5;
      } }
  ];

  let audioCtx, masterGain, droneOsc1, droneOsc2, noiseNode, filterNode, lfoNode;
  
  function initAudio() {
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);
  }

  function startAmbientHorror() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 3);

    // Dissonant Beating Drones (generative ambient)
    droneOsc1 = audioCtx.createOscillator();
    droneOsc2 = audioCtx.createOscillator();
    droneOsc1.type = 'sine'; droneOsc2.type = 'triangle';
    droneOsc1.frequency.value = 45; // Low rumble
    droneOsc2.frequency.value = 47.5; // Creates a beating dissonance
    
    let droneGain = audioCtx.createGain();
    droneGain.gain.value = 0.25;
    droneOsc1.connect(droneGain); droneOsc2.connect(droneGain);
    droneGain.connect(masterGain);
    droneOsc1.start(); droneOsc2.start();

    // Procedural Breathing Noise
    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
    
    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = noiseBuffer;
    noiseNode.loop = true;

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'lowpass';
    filterNode.frequency.value = 200; 

    lfoNode = audioCtx.createOscillator();
    lfoNode.type = 'sine';
    lfoNode.frequency.value = 0.12; // Breathing rate
    
    let lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 800; // Modulate cutoff frequency
    lfoNode.connect(lfoGain); lfoGain.connect(filterNode.frequency);
    
    let breathGain = audioCtx.createGain();
    breathGain.gain.value = 0; // Starts quiet
    state.breathGainNode = breathGain; // store for dread updates

    noiseNode.connect(filterNode);
    filterNode.connect(breathGain);
    breathGain.connect(masterGain);

    lfoNode.start(); noiseNode.start();
  }

  function playScareChord() {
    if (!state.soundOn || !audioCtx) return;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const osc3 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc1.type = 'sawtooth'; osc2.type = 'square'; osc3.type = 'sawtooth';
    osc1.frequency.value = 110; osc2.frequency.value = 116.5; osc3.frequency.value = 55;
    
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
    
    osc1.connect(gain); osc2.connect(gain); osc3.connect(gain);
    gain.connect(masterGain);
    
    osc1.start(); osc2.start(); osc3.start();
    osc1.stop(audioCtx.currentTime + 1.6); osc2.stop(audioCtx.currentTime + 1.6); osc3.stop(audioCtx.currentTime + 1.6);
  }

  document.getElementById('soundToggle').addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    document.getElementById('soundToggle').textContent = state.soundOn ? 'sound: on' : 'sound: off';
    if(state.soundOn) startAmbientHorror();
    else if(masterGain) masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    state.themeIndex = (state.themeIndex + 1) % state.themes.length;
    const t = state.themes[state.themeIndex];
    if(t === 'default') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', t);
    document.getElementById('themeToggle').textContent = 'theme: ' + t;
  });

  const canvas = document.getElementById('fxCanvas');
  const ctx = canvas.getContext('2d');
  let spirals = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Draw hypnotic Junji Ito-style spirals that intensify with dread
  function animateCanvas() {
    if (state.reducedMotion || state.dread < 2) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      requestAnimationFrame(animateCanvas);
      return;
    }

    ctx.fillStyle = `rgba(${state.themeIndex===1?'28,10,10':'242,241,236'}, 0.05)`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const time = Date.now() * 0.0005 * (1 + state.dread * 0.2);
    const maxRadius = Math.max(canvas.width, canvas.height) * (state.dread * 0.1);

    ctx.beginPath();
    ctx.strokeStyle = state.themeIndex === 2 ? '#d4d4d4' : '#3a3a38';
    ctx.lineWidth = 1 + (state.dread * 0.3);

    for (let angle = 0; angle <= Math.PI * 12; angle += 0.1) {
      const radius = (maxRadius / (Math.PI * 12)) * angle;
      const x = centerX + radius * Math.cos(angle - time);
      const y = centerY + radius * Math.sin(angle - time);
      if (angle === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    requestAnimationFrame(animateCanvas);
  }
  animateCanvas();

  function applyDread(level) {
    state.dread = level;
    document.documentElement.style.setProperty('--dread', level);
    canvas.style.opacity = Math.min(level * 0.15, 0.8);
    
    if(state.breathGainNode && audioCtx) {
       state.breathGainNode.gain.linearRampToValueAtTime(Math.min(level * 0.05, 0.4), audioCtx.currentTime + 1);
       if(lfoNode) lfoNode.frequency.linearRampToValueAtTime(0.12 + (level*0.03), audioCtx.currentTime + 1);
    }
  }

  function triggerGlitch() {
    if (state.reducedMotion) return;
    const promptEl = document.querySelector('.prompt');
    if(promptEl) {
      promptEl.setAttribute('data-text', promptEl.textContent);
      promptEl.classList.add('glitching');
      setTimeout(() => promptEl.classList.remove('glitching'), 100 + Math.random() * 150);
    }
    document.getElementById('scanlines').classList.add('glitch');
    setTimeout(() => document.getElementById('scanlines').classList.remove('glitch'), 500);
  }

  function triggerJumpScare() {
    if (state.reducedMotion) return;
    playScareChord();
    const flash = document.getElementById('jumpscare');
    flash.style.opacity = '1';
    
    // Distort card drastically
    const card = document.getElementById('card');
    if(card) card.classList.add('glitch-heavy');
    
    setTimeout(() => {
      flash.style.transition = 'opacity 1s ease';
      flash.style.opacity = '0';
      if(card) card.classList.remove('glitch-heavy');
      setTimeout(() => flash.style.transition = '', 1000);
    }, 50);
  }

  const app = document.getElementById('app');

  function renderConsent() {
    app.innerHTML = `
      <div class="card" style="padding: 40px;">
        <div class="section-tag">PROTOCOL NO. MI-77-Theta</div>
        <h1 style="font-family:var(--current-font); margin:0 0 10px; font-size:22px;">Cognitive & Perceptual Studies</h1>
        <p style="margin-bottom: 20px; line-height: 1.6; font-size: 15px;">Please verify your baseline before continuing. This intake survey contains audio synthesis and visual anomalies designed to test cognitive stress.</p>
        <div class="btn-row" style="justify-content: flex-start;">
          <button class="btn" id="startBtn">Begin Assessment</button>
        </div>
      </div>
    `;
    document.getElementById('startBtn').addEventListener('click', () => {
      state.screen = 'survey';
      if(!audioCtx && state.soundOn) startAmbientHorror();
      renderQuestionShell();
    });
  }

  function renderQuestionShell() {
    app.innerHTML = '';
    const m = document.createElement('div');
    m.className = 'masthead';
    m.innerHTML = `<div class="dept">Dept of Cognitive Studies</div><div class="title">Intake Survey</div>`;
    
    const p = document.createElement('div');
    p.className = 'progress-wrap';
    p.innerHTML = `<div class="progress-track"><div class="progress-fill" id="pFill"></div></div><div class="progress-label"><span id="pText"></span><span>PHASE ${Math.floor(state.qIndex/4)+1}</span></div>`;
    
    const c = document.createElement('div');
    c.className = 'card entering';
    c.id = 'card';
    
    app.appendChild(m); app.appendChild(p); app.appendChild(c);
    renderQuestion(c);
    
    requestAnimationFrame(() => {
      c.classList.remove('entering');
      c.classList.add('visible');
    });
  }

  function renderQuestion(cardEl) {
    const q = QUESTIONS[state.qIndex];
    if (!q) return renderEnding();

    applyDread(Math.floor((state.qIndex / QUESTIONS.length) * 10));
    
    const fill = document.getElementById('pFill');
    const pText = document.getElementById('pText');
    const pct = Math.round((state.qIndex / QUESTIONS.length) * 100);
    if(fill) fill.style.width = pct + '%';
    if(pText) pText.textContent = pct + '%';

    if (q.flags?.titleHijack) document.title = "DO NOT LOOK AWAY";
    if (q.flags?.heavyGlitch) triggerGlitch();
    if (q.flags?.jumpScare) triggerJumpScare();

    cardEl.innerHTML = `
      <div class="section-tag">${q.sectionTitle}</div>
      <div class="prompt">${q.prompt.replace('{name}', state.name)}</div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="options" id="optContainer"></div>
      <div class="btn-row"><button class="btn" id="continueBtn" disabled>Continue</button></div>
    `;

    const container = document.getElementById('optContainer');
    const btn = document.getElementById('continueBtn');
    let selected = null;

    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.innerHTML = `<span class="dot"></span><span>${opt}</span>`;
      el.addEventListener('click', () => {
        [...container.children].forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
        btn.disabled = false;
        
        if (q.flags?.overwrite) {
          triggerGlitch();
          const alt = q.options.find(x => x !== opt) || opt;
          setTimeout(() => { if(selected === opt) el.querySelector('span:last-child').textContent = alt; selected = alt; }, 600);
        }
      });
      container.appendChild(el);
    });

    btn.addEventListener('click', () => {
      state.answers[q.id] = selected;
      if(q.id === 'q1') state.name = selected;
      if(q.effect) q.effect(selected); // Evaluate ending variables
      
      btn.disabled = true;
      cardEl.classList.remove('visible');
      cardEl.classList.add('leaving');
      
      if(state.soundOn && audioCtx) {
         // UI Click sound
         const osc = audioCtx.createOscillator();
         const gn = audioCtx.createGain();
         osc.frequency.value = 800 - (state.dread * 30);
         gn.gain.value = 0.05;
         osc.connect(gn).connect(masterGain);
         osc.start(); osc.stop(audioCtx.currentTime + 0.05);
      }

      setTimeout(() => {
        state.qIndex++;
        cardEl.classList.remove('leaving');
        cardEl.classList.add('entering');
        renderQuestion(cardEl);
        requestAnimationFrame(() => {
          cardEl.classList.remove('entering');
          cardEl.classList.add('visible');
        });
      }, 500);
    });
  }

  function renderEnding() {
    app.innerHTML = '';
    
    // Determine Ending based on state.endings tally
    let endingType = 'neutral';
    if (state.endings.madness > state.endings.conformity && state.endings.madness > state.endings.rebellion) endingType = 'madness';
    else if (state.endings.rebellion > state.endings.conformity) endingType = 'rebellion';
    else if (state.endings.conformity > state.endings.rebellion) endingType = 'conformity';

    let text = "";
    if (endingType === 'conformity') {
      text = "ASSESSMENT COMPLETE.<br><br>Your baseline is acceptable. Remain compliant. We will send someone to your room shortly.";
    } else if (endingType === 'rebellion') {
      text = "ASSESSMENT FAILED.<br><br>Subject is demonstrating hostility. Initiating containment protocols. Do not attempt to leave.";
    } else {
      text = "ERROR: REALITY COHESION LOST.<br><br>The walls are breathing. The door is gone. There is only the survey.";
      triggerJumpScare();
      if(lfoNode && audioCtx) lfoNode.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 2); // Erratic audio
    }

    const overlay = document.createElement('div');
    overlay.className = 'fade-to-black';
    overlay.innerHTML = `<div class="ending-text" id="endText">${text}</div>`;
    document.body.appendChild(overlay);
    
    requestAnimationFrame(() => {
      overlay.classList.add('active');
      setTimeout(() => { document.getElementById('endText').classList.add('show'); }, 1500);
      
      setTimeout(() => {
         // Auto-close/refresh simulation
         if(masterGain) masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
         document.getElementById('endText').textContent = "Connection Lost.";
      }, 7000);
    });
  }

  // Random intermittent glitches
  setInterval(() => {
    if(state.screen === 'survey' && state.dread > 3 && Math.random() < (state.dread * 0.05)) triggerGlitch();
  }, 3000);

  renderConsent();
})();
</script>
</body>
